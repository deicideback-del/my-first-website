<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Addon Tools By Deicide</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าสีหลัก */
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --secondary-color: #1976d2; /* สีน้ำเงินสำหรับปุ่มหาเส้นทาง */
            --secondary-hover: #115293;
            --bg-color: #e9ecef;
            --text-color: #333;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 { 
            text-align: center; 
            color: var(--text-color); 
            margin-top: 0;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        /* --- ระบบ Tab --- */
        .tab-container {
            display: flex;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background-color: #f8f9fa;
            border: none;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-weight: 600;
            color: #555;
            transition: all 0.3s ease;
        }

        .tab-btn.active[data-target="merge-section"] {
            background-color: var(--primary-color);
            color: white;
        }

        .tab-btn.active[data-target="path-section"] {
            background-color: var(--secondary-color);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* --------------- */

        .form-group { 
            margin-bottom: 25px; 
        }

        label { 
            font-weight: 600; 
            display: block; 
            margin-bottom: 10px; 
            color: #444; 
        }

        /* ตกแต่งช่องอัปโหลดไฟล์ */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 80px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .file-upload-wrapper:hover {
            border-color: #888;
            background-color: #f1f1f1;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: #666;
            text-align: center;
            pointer-events: none;
        }

        /* ตกแต่งช่องพิมพ์ข้อความ */
        input[type="text"] { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            box-sizing: border-box; 
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
        }

        /* ตกแต่งปุ่มกด */
        .submit-btn { 
            width: 100%; 
            padding: 15px; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: 600; 
            font-family: 'Prompt', sans-serif;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-merge { background-color: var(--primary-color); }
        .btn-merge:hover { background-color: var(--primary-hover); }

        .btn-path { background-color: var(--secondary-color); }
        .btn-path:hover { background-color: var(--secondary-hover); }

        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Addon Tools By Deicide</h2>
        <p class="subtitle">ระบบจัดการ Minecraft Addon อัตโนมัติ (Universal)</p>
        
        <div class="tab-container">
            <button class="tab-btn active" data-target="merge-section">📦 รวมแอดออน</button>
            <button class="tab-btn" data-target="path-section">🔍 หาเส้นทาง Texture</button>
        </div>

        <div id="merge-section" class="tab-content active">
            <form action="/merge" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>1. อัปโหลดไฟล์ Addon เพื่อรวม (.zip, .mcaddon, .mcpack)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" name="files" class="file-input" multiple required accept=".zip,.mcaddon,.mcpack">
                        <div class="file-upload-text">
                            📁 คลิกเพื่อเลือกไฟล์<br><small>(สามารถเลือกได้หลายไฟล์พร้อมกัน)</small>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="output_name">2. ตั้งชื่อไฟล์ผลลัพธ์</label>
                    <input type="text" name="output_name" id="output_name" placeholder="เช่น MySuperAddon (ไม่ต้องใส่ .mcaddon)" required>
                </div>
                
                <button type="submit" class="submit-btn btn-merge">เริ่มรวมไฟล์ (Merge)</button>
            </form>
        </div>

        <div id="path-section" class="tab-content">
            <form action="/find_paths" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>1. อัปโหลดไฟล์ Addon เพื่อตรวจสอบ (.zip, .mcaddon, .mcpack)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" name="files" class="file-input" multiple required accept=".zip,.mcaddon,.mcpack">
                        <div class="file-upload-text">
                            📁 คลิกเพื่อเลือกไฟล์<br><small>(สามารถเลือกได้หลายไฟล์พร้อมกัน)</small>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn btn-path">ตรวจสอบเส้นทาง Texture</button>
            </form>
        </div>

    </div>

    <script>
        // ระบบสลับ Tab
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // เอาคลาส active ออกจากปุ่มและเนื้อหาทั้งหมดก่อน
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                // เพิ่มคลาส active ให้ปุ่มที่โดนคลิก และหน้าต่างเป้าหมาย
                btn.classList.add('active');
                const targetId = btn.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });

        // ระบบเปลี่ยนข้อความเมื่อเลือกไฟล์ (รองรับทั้ง 2 หน้าต่าง)
        const fileInputs = document.querySelectorAll('.file-input');

        fileInputs.forEach(input => {
            input.addEventListener('change', function() {
                // หา element แสดงข้อความที่อยู่ในกล่องเดียวกัน
                const textDisplay = this.nextElementSibling; 
                
                if (this.files && this.files.length > 0) {
                    if (this.files.length === 1) {
                        textDisplay.innerHTML = `✅ เลือกแล้ว: <b>${this.files[0].name}</b>`;
                    } else {
                        textDisplay.innerHTML = `✅ เลือกแล้วจำนวน: <b>${this.files.length} ไฟล์</b>`;
                    }
                    textDisplay.style.color = '#333';
                } else {
                    textDisplay.innerHTML = `📁 คลิกเพื่อเลือกไฟล์<br><small>(สามารถเลือกได้หลายไฟล์พร้อมกัน)</small>`;
                    textDisplay.style.color = '#666';
                }
            });
        });
    </script>
</body>
</html>
