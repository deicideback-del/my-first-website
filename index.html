<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Addon Merger</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าสีหลัก */
        :root {
            --primary-color: #2e7d32; /* สีเขียวสไตล์ Minecraft */
            --primary-hover: #1b5e20;
            --bg-color: #e9ecef;
            --text-color: #333;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 { 
            text-align: center; 
            color: var(--primary-color); 
            margin-top: 0;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .form-group { 
            margin-bottom: 25px; 
        }

        label { 
            font-weight: 600; 
            display: block; 
            margin-bottom: 10px; 
            color: #444; 
        }

        /* ตกแต่งช่องอัปโหลดไฟล์ */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 80px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary-color);
            background-color: #f1f8f1;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: #666;
            text-align: center;
            pointer-events: none;
        }

        /* ตกแต่งช่องพิมพ์ข้อความ */
        input[type="text"] { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            box-sizing: border-box; 
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
        }

        /* ตกแต่งปุ่มกด */
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: 600; 
            font-family: 'Prompt', sans-serif;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover { 
            background-color: var(--primary-hover); 
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>รวม Addon By Deicide</h2>
        <p class="subtitle">ระบบรวมไฟล์ Minecraft Addon อัตโนมัติ (Universal)</p>
        
        <form action="/merge" method="post" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>1. อัปโหลดไฟล์ Addon (.zip, .mcaddon, .mcpack)</label>
                <div class="file-upload-wrapper">
                    <input type="file" name="files" id="file-input" multiple required accept=".zip,.mcaddon,.mcpack">
                    <div class="file-upload-text" id="file-text">
                        📁 คลิกเพื่อเลือกไฟล์<br><small>(สามารถเลือกได้หลายไฟล์พร้อมกัน)</small>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="output_name">2. ตั้งชื่อไฟล์ผลลัพธ์</label>
                <input type="text" name="output_name" id="output_name" placeholder="เช่น MySuperAddon (ไม่ต้องใส่ .mcaddon)" required>
            </div>
            
            <button type="submit"> เริ่มรวมไฟล์ (Merge) & ดาวน์โหลด</button>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileText = document.getElementById('file-text');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                if (this.files.length === 1) {
                    fileText.innerHTML = `✅ เลือกแล้ว: <b>${this.files[0].name}</b>`;
                } else {
                    fileText.innerHTML = `✅ เลือกแล้วจำนวน: <b>${this.files.length} ไฟล์</b>`;
                }
                fileText.style.color = '#2e7d32';
            } else {
                fileText.innerHTML = `📁 คลิกเพื่อเลือกไฟล์<br><small>(สามารถเลือกได้หลายไฟล์พร้อมกัน)</small>`;
                fileText.style.color = '#666';
            }
        });
    </script>
</body>
</html>
